# Render Blueprint para la API Yupay Turismo (Node + Express + Supabase).
# Este repositorio (Yupay-api) ES la API: el package.json está en la raíz, así que NO se
# usa rootDir. La consola web de pruebas (web/) vive fuera de este repo y no se despliega.
#
# Uso:
#   1) Sube este repositorio a GitHub/GitLab.
#   2) En Render: "New +" -> "Blueprint" -> selecciona el repo (Render detecta este
#      render.yaml automáticamente).
#   3) Render crea el servicio. Entra a "Environment" y rellena los secretos marcados
#      abajo con "sync: false" (no se versionan):
#        SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY.
#   4) Tras el deploy tendrás una URL pública https://<servicio>.onrender.com
#      (ese es el baseUrl que usará la app Android y la consola web de pruebas).
#   5) El reset de contraseña va por CÓDIGO de 6 dígitos (OTP): edita la plantilla
#      Supabase -> Authentication -> Email Templates -> "Reset Password" con {{ .Token }}.
#      (Opcional) Define GOOGLE_WEB_CLIENT_ID / GOOGLE_ANDROID_CLIENT_ID para Google nativo.
#
# Nota: el plan "free" se suspende tras inactividad (cold start de ~30-60 s en la
# primera petición). Para evitarlo, sube de plan o usa un ping periódico.
services:
  - type: web
    name: yupay-turismo-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Fija la versión de Node que usará Render.
      - key: NODE_VERSION
        value: 20.18.1
      # --- Secretos: NO se versionan. Rellénalos en el dashboard de Render. ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Opcionales (Google nativo Android): Client ID Web y Android. Vacíos => la API
      # sigue funcionando; la validación del idToken la hace Supabase.
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      # --- No secretos: valores por defecto (editables en el dashboard). ---
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: CONTENT_MIN_NEW_VISITS
        value: "10"
      - key: CONTENT_MIN_PRODUCT_CHANGES
        value: "3"
      - key: CONTENT_REGEN_DAYS
        value: "30"
    # PORT lo inyecta Render automáticamente; el server ya escucha en process.env.PORT.
